name: Release

# Push a tag like v1.0.0 to build installers for every platform and publish
# them to the separate kudzaiprichard/anvil-releases repo (NOT this repo's own
# Releases tab) as a draft release. See RELEASING.md.
#
# Publishing cross-repo needs a token scoped to anvil-releases, since the
# default GITHUB_TOKEN Actions provides is scoped only to the repo the
# workflow runs in. One-time maintainer setup:
#   1. github.com/settings/tokens?type=beta → generate a fine-grained PAT
#      scoped to ONLY kudzaiprichard/anvil-releases, with "Contents: write".
#   2. gh secret set RELEASES_REPO_TOKEN --repo kudzaiprichard/anvil
#      (paste the token when prompted — never commit it, never paste it into
#      a chat/log; this command sends it straight to GitHub's secret store).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Creates the draft release exactly ONCE, before any platform builds start.
  # The 4 matrix jobs below only ever *upload* to it — never create. Doing
  # create-or-upload inside each matrix job (the previous design) raced: since
  # `anvil-releases` has no real git tag/commit matching this tag name, `gh
  # release create` doesn't reliably collide across concurrent callers, so
  # parallel jobs each independently "won" and produced separate duplicate
  # "untagged-" releases instead of sharing one.
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      # A manual "Run workflow" dispatch must be launched from an existing tag
      # (pick it in the "Use workflow from" ref dropdown) — dispatching from a
      # branch would resolve `github.ref_name` to the branch name and publish
      # a garbage "release" tagged e.g. "main". Tag pushes are always
      # `ref_type == 'tag'` and need no guard.
      - name: Require a tag ref
        if: github.event_name == 'workflow_dispatch' && github.ref_type != 'tag'
        run: |
          echo "::error::Manual dispatch must be run from an existing tag (select it in the 'Use workflow from' dropdown), not a branch — got ref '${{ github.ref_name }}' (${{ github.ref_type }})."
          exit 1

      # Idempotent: re-running this workflow against a tag that already has a
      # release (e.g. a manual retry) just proceeds instead of erroring.
      - name: Create the release (if it doesn't already exist)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo kudzaiprichard/anvil-releases >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping create."
            exit 0
          fi
          gh release create "${{ github.ref_name }}" \
            --repo kudzaiprichard/anvil-releases \
            --title "Anvil ${{ github.ref_name }}" \
            --notes "See the assets below to download and install Anvil." \
            --draft

  release:
    name: Build ${{ matrix.platform }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Shipping safety gate (COURSE_BLUEPRINT.md §2): fail the release before it
      # is ever bundled if any *leetcode* catalog — or any bulk statement dump
      # over the no-scrape baseline — would be packaged into the installer.
      - name: Installer boundary check (no *leetcode* bundling)
        run: python tools/check_release_boundary.py

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs the configured beforeBuildCommand (npm run build) and
      # bundles installers — build only, no release inputs, so it does NOT
      # attach anything to this repo's own Releases. Publishing (to the
      # separate anvil-releases repo) is the next step.
      - name: Build the app + installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # Publish to kudzaiprichard/anvil-releases, not this repo. The default
      # GITHUB_TOKEN can't create/upload to a different repo, so this uses
      # RELEASES_REPO_TOKEN (see the one-time setup note at the top of this
      # file). The release itself was already created once by the
      # create-release job above — every matrix job here only ever uploads
      # its own platform's installers onto that same, already-existing
      # release, so there's no create-vs-exists race between them.
      - name: Publish installers to kudzaiprichard/anvil-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        shell: bash
        run: |
          # `find`, not a `**` glob: macOS runners default to bash 3.2 (Apple
          # never shipped 4+, GPLv3), which has no `shopt -s globstar` at all —
          # this must work identically there and on Ubuntu/Windows(git-bash).
          # Scoped to */release/bundle/* so this only ever picks up the
          # Tauri bundler's installer output, never a plain debug/release
          # binary or build-script artifact that happens to share an extension
          # (e.g. target/release/anvil.exe is not an installer).
          files=()
          while IFS= read -r f; do
            files+=("$f")
          done < <(find src-tauri/target -type f -path '*/release/bundle/*' \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \
          \) 2>/dev/null)

          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::no installer files matched for ${{ matrix.platform }} — nothing to publish"
            exit 0
          fi
          gh release upload "${{ github.ref_name }}" \
            --repo kudzaiprichard/anvil-releases \
            --clobber \
            "${files[@]}"
