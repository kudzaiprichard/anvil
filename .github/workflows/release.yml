name: Release

# Push a tag like v1.0.0 to build installers for every platform and attach
# them to a draft GitHub Release. See PROJECT_SPEC §7.5 (build matrix).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    name: Build ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Shipping safety gate (COURSE_BLUEPRINT.md §2): fail the release before it
      # is ever bundled if any *leetcode* catalog — or any bulk statement dump
      # over the no-scrape baseline — would be packaged into the installer.
      - name: Installer boundary check (no *leetcode* bundling)
        run: python tools/check_release_boundary.py

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs the configured beforeBuildCommand (npm run build),
      # bundles installers, and attaches them to the release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anvil ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Anvil."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
