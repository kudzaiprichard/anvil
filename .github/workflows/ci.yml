name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content:
    name: Content & shipping boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      # Fail-closed content validation: the curriculum DAG, every lesson's
      # required parts, quiz answers, diagram indices (LESSON_COURSE_DESIGN.md §8).
      - name: Validate curriculum content
        run: python tools/build_curriculum.py --check
      # Shipping safety gate: no *leetcode* catalog (or bulk statement dump) is
      # ever bundled (COURSE_BLUEPRINT.md §2). A clean checkout has no scrape, so
      # this continuously asserts nothing forbidden was committed.
      - name: Installer boundary check
        run: python tools/check_release_boundary.py

  web:
    name: Lint & build (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  rust:
    name: Rust (fmt, clippy, test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # tauri's generate_context! embeds the frontend, so build the static export first.
      - name: Build frontend (static export)
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
