name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # ready_for_review is not in the default set — it's what fires CI when a
    # draft PR (which the rust/web jobs skip) is marked ready.
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detects which areas the change touches so the expensive jobs below only
  # run when their inputs could have changed (a docs-only PR finishes CI in
  # seconds). IMPORTANT: this must stay JOB-level filtering (`needs` + `if`),
  # never workflow-level `paths:` — a skipped job still reports a check run,
  # and GitHub treats skipped required checks as satisfied, so the "main
  # protection" ruleset keeps working; a workflow that never triggers leaves
  # its required checks stuck on "Expected" and the PR unmergeable.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'
            web:
              - 'app/**'
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.*'
              - 'eslint.config.*'
              - 'postcss.config.*'
              - '.github/workflows/ci.yml'

  # Always runs (≈10s) — the shipping boundary is the project's one
  # inviolable safety rule, and curriculum validity is cheap to assert.
  content:
    name: Content & shipping boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install pyyaml
      # Fail-closed content validation: the curriculum DAG, every lesson's
      # required parts, quiz answers, diagram indices (LESSON_COURSE_DESIGN.md §8).
      - name: Validate curriculum content
        run: python tools/build_curriculum.py --check
      # Shipping safety gate: no *leetcode* catalog (or bulk statement dump) is
      # ever bundled (COURSE_BLUEPRINT.md §2). A clean checkout has no scrape, so
      # this continuously asserts nothing forbidden was committed.
      - name: Installer boundary check
        run: python tools/check_release_boundary.py

  # Skipped when the change can't affect the frontend, and on draft PRs
  # (mark "Ready for review" to fire CI — the merge gate still requires it).
  web:
    name: Lint & build (web)
    needs: changes
    if: >-
      needs.changes.outputs.web == 'true' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Skipped when nothing under src-tauri/ changed, and on draft PRs.
  rust:
    name: Rust (fmt, clippy, test)
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' &&
      (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # tauri's generate_context! embeds the frontend, so build the static export first.
      - name: Build frontend (static export)
        run: npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
